spring.application.name=cliente
server.port=${SERVER_PORT:8082}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bantads}?currentSchema=schema_cliente
spring.datasource.username=${POSTGRES_USER:postgres_user}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=schema_cliente

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:bantads}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:bantads}

# Messaging
app.rabbitmq.exchange.cliente=cliente.exchange
app.rabbitmq.queue.cliente=cliente.queue
app.rabbitmq.routing-key.cliente.criado=cliente.criado
