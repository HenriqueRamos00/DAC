saga.rabbitmq.routing-key.auth.excluir-usuario-gerente-compensacao.command=${SAGA_RABBITMQ_ROUTING_KEY_AUTH_EXCLUIR_USUARIO_GERENTE_COMPENSACAO_COMMAND:auth.excluir-usuario-gerente-compensacao}
saga.rabbitmq.routing-key.auth.excluir-usuario-gerente-compensacao.sucesso=${SAGA_RABBITMQ_ROUTING_KEY_AUTH_EXCLUIR_USUARIO_GERENTE_COMPENSACAO_SUCESSO:auth.usuario-gerente-excluido-compensacao}
