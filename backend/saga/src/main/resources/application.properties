spring.application.name=saga
server.port=${SAGA_PORT:8086}

# PostgreSQL - Saga DB
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:bantads}
spring.datasource.username=${POSTGRES_USER:postgres_user}
spring.datasource.password=${POSTGRES_PASSWORD:postgres_bantads}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=schema_saga
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:bantads}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:bantads}

# Saga Messaging - shared exchange
saga.rabbitmq.exchange=${SAGA_RABBITMQ_EXCHANGE:bantads.saga}

# Saga Inserir Gerente - command routing-keys (publicados pelo saga, consumidos pelos MSs)
saga.rabbitmq.routing-key.conta.consultar-gerente-mais-contas.command=${SAGA_RABBITMQ_ROUTING_KEY_CONTA_CONSULTAR_GERENTE_MAIS_CONTAS_COMMAND:conta.consultar-gerente-mais-contas}
