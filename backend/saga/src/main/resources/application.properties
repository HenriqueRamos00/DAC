saga.rabbitmq.routing-key.gerente.listar-ativos-detalhado.falha=${SAGA_RABBITMQ_ROUTING_KEY_GERENTE_LISTAR_ATIVOS_DETALHADO_FALHA:gerente.listagem-ativos-detalhados.falhou}
