spring.application.name=saga
server.port=${SAGA_PORT:8086}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:bantads}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:bantads}

# Saga Messaging - shared exchange
saga.rabbitmq.exchange=${SAGA_RABBITMQ_EXCHANGE:bantads.saga}

# Saga Inserir Gerente - command routing-keys (publicados pelo saga, consumidos pelos MSs)
saga.rabbitmq.routing-key.conta.consultar-gerente-mais-contas.command=${SAGA_RABBITMQ_ROUTING_KEY_CONTA_CONSULTAR_GERENTE_MAIS_CONTAS_COMMAND:conta.consultar-gerente-mais-contas}
saga.rabbitmq.routing-key.gerente.inserir.command=${SAGA_RABBITMQ_ROUTING_KEY_GERENTE_INSERIR_COMMAND:gerente.inserir}
saga.rabbitmq.routing-key.conta.atribuir-gerente.command=${SAGA_RABBITMQ_ROUTING_KEY_CONTA_ATRIBUIR_GERENTE_COMMAND:conta.atribuir-gerente}

# Saga Inserir Gerente - response routing-keys (publicados pelos MSs, consumidos pelo saga)
saga.rabbitmq.routing-key.conta.consultar-gerente-mais-contas.sucesso=${SAGA_RABBITMQ_ROUTING_KEY_CONTA_CONSULTAR_GERENTE_MAIS_CONTAS_SUCESSO:conta.gerente-mais-contas-consultado}
saga.rabbitmq.routing-key.conta.consultar-gerente-mais-contas.falha=${SAGA_RABBITMQ_ROUTING_KEY_CONTA_CONSULTAR_GERENTE_MAIS_CONTAS_FALHA:conta.consulta-gerente-mais-contas.falhou}
saga.rabbitmq.routing-key.gerente.inserir.sucesso=${SAGA_RABBITMQ_ROUTING_KEY_GERENTE_INSERIR_SUCESSO:gerente.inserido}
saga.rabbitmq.routing-key.gerente.inserir.falha=${SAGA_RABBITMQ_ROUTING_KEY_GERENTE_INSERIR_FALHA:gerente.insercao.falhou}
saga.rabbitmq.routing-key.conta.atribuir-gerente.sucesso=${SAGA_RABBITMQ_ROUTING_KEY_CONTA_ATRIBUIR_GERENTE_SUCESSO:conta.gerente-atribuido}
saga.rabbitmq.routing-key.conta.atribuir-gerente.falha=${SAGA_RABBITMQ_ROUTING_KEY_CONTA_ATRIBUIR_GERENTE_FALHA:conta.atribuicao-gerente.falhou}

# Saga - queue do orquestrador para receber respostas dos MSs
saga.rabbitmq.queue.inserir-gerente.response=${SAGA_RABBITMQ_QUEUE_SAGA_INSERIR_GERENTE_RESPONSE:saga.inserir-gerente.response}

# Timeout de espera de cada step (ms)
saga.step.timeout-ms=10000

# Saga Alteração de Perfil - command routing-keys (publicados pelo saga, consumidos pelos MSs)
saga.rabbitmq.routing-key.cliente.alterar-perfil.command=${SAGA_RABBITMQ_ROUTING_KEY_CLIENTE_ALTERAR_PERFIL_COMMAND:cliente.alterar-perfil.command}
saga.rabbitmq.routing-key.conta.alterar-limite.command=${SAGA_RABBITMQ_ROUTING_KEY_CONTA_ALTERAR_LIMITE_COMMAND:conta.alterar-limite.command}

# Saga Alteração de Perfil - response routing-keys (publicados pelos MSs, consumidos pelo saga)
saga.rabbitmq.routing-key.cliente.alterar-perfil.sucesso=${SAGA_RABBITMQ_ROUTING_KEY_CLIENTE_ALTERAR_PERFIL_SUCESSO:cliente.perfil-alterado}
saga.rabbitmq.routing-key.cliente.alterar-perfil.falha=${SAGA_RABBITMQ_ROUTING_KEY_CLIENTE_ALTERAR_PERFIL_FALHA:cliente.alteracao-perfil.falhou}
saga.rabbitmq.routing-key.conta.alterar-limite.sucesso=${SAGA_RABBITMQ_ROUTING_KEY_CONTA_ALTERAR_LIMITE_SUCESSO:conta.limite-alterado}
saga.rabbitmq.routing-key.conta.alterar-limite.falha=${SAGA_RABBITMQ_ROUTING_KEY_CONTA_ALTERAR_LIMITE_FALHA:conta.alteracao-limite.falhou}

# Saga Alteração de Perfil - queue do orquestrador para receber respostas dos MSs
saga.rabbitmq.queue.alteracao-perfil.response=${SAGA_RABBITMQ_QUEUE_ALTERACAO_PERFIL_RESPONSE:saga.alteracao-perfil.response.queue}

# Saga Remoção de Gerente - command routing-keys (publicados pelo saga, consumidos pelos MSs)
saga.rabbitmq.routing-key.gerente.listar-ativos.command=${SAGA_RABBITMQ_ROUTING_KEY_GERENTE_LISTAR_ATIVOS_COMMAND:gerente.listar-ativos}
saga.rabbitmq.routing-key.conta.reatribuir-contas-gerente.command=${SAGA_RABBITMQ_ROUTING_KEY_CONTA_REATRIBUIR_CONTAS_GERENTE_COMMAND:conta.reatribuir-contas-gerente}
saga.rabbitmq.routing-key.gerente.remover.command=${SAGA_RABBITMQ_ROUTING_KEY_GERENTE_REMOVER_COMMAND:gerente.remover}

# Saga Remoção de Gerente - response routing-keys (publicados pelos MSs, consumidos pelo saga)
saga.rabbitmq.routing-key.gerente.listar-ativos.sucesso=${SAGA_RABBITMQ_ROUTING_KEY_GERENTE_LISTAR_ATIVOS_SUCESSO:gerente.ativos-listados}
saga.rabbitmq.routing-key.gerente.listar-ativos.falha=${SAGA_RABBITMQ_ROUTING_KEY_GERENTE_LISTAR_ATIVOS_FALHA:gerente.listagem-ativos.falhou}
saga.rabbitmq.routing-key.conta.reatribuir-contas-gerente.sucesso=${SAGA_RABBITMQ_ROUTING_KEY_CONTA_REATRIBUIR_CONTAS_GERENTE_SUCESSO:conta.contas-reatribuidas}
saga.rabbitmq.routing-key.conta.reatribuir-contas-gerente.falha=${SAGA_RABBITMQ_ROUTING_KEY_CONTA_REATRIBUIR_CONTAS_GERENTE_FALHA:conta.reatribuicao-contas.falhou}
saga.rabbitmq.routing-key.gerente.remover.sucesso=${SAGA_RABBITMQ_ROUTING_KEY_GERENTE_REMOVER_SUCESSO:gerente.removido}
saga.rabbitmq.routing-key.gerente.remover.falha=${SAGA_RABBITMQ_ROUTING_KEY_GERENTE_REMOVER_FALHA:gerente.remocao.falhou}

# Saga Remoção de Gerente - queue do orquestrador para receber respostas dos MSs
saga.rabbitmq.queue.remocao-gerente.response=${SAGA_RABBITMQ_QUEUE_REMOCAO_GERENTE_RESPONSE:saga.remocao-gerente.response}
