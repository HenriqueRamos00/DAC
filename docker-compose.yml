services:
  postgres-db:
    image: postgres:16
    container_name: bantads-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/databases/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - bantads-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-db:
    image: mongo:7
    container_name: bantads-mongo
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo-data:/data/db
      - ./backend/databases/mongo/init:/docker-entrypoint-initdb.d
    networks:
      - bantads-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: bantads-rabbitmq
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - bantads-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ms-auth:
    build:
      context: ./backend/ms-auth
    container_name: bantads-ms-auth
    restart: unless-stopped
    env_file: .env
    environment:
      SERVER_PORT: 8081
      MONGO_HOST: mongo-db
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8081:8081"
    depends_on:
      mongo-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bantads-network

  ms-cliente:
    build:
      context: ./backend/ms-cliente
    container_name: bantads-ms-cliente
    restart: unless-stopped
    env_file: .env
    environment:
      SERVER_PORT: 8082
      DB_HOST: postgres-db
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8082:8082"
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bantads-network

  ms-conta:
    build:
      context: ./backend/ms-conta
    container_name: bantads-ms-conta
    restart: unless-stopped
    env_file: .env
    environment:
      SERVER_PORT: 8083
      POSTGRES_HOST: postgres-db
      DB_HOST: postgres-db
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8083:8083"
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bantads-network

  ms-gerente:
    build:
      context: ./backend/ms-gerente
    container_name: bantads-ms-gerente
    restart: unless-stopped
    env_file: .env
    environment:
      SERVER_PORT: 8084
      DB_HOST: postgres-db
      RABBITMQ_HOST: rabbitmq
    ports:
      - "8084:8084"
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bantads-network

  api-gateway:
    build:
      context: ./backend/api-gateway
    container_name: bantads-api-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      GATEWAY_PORT: 3000
      GATEWAY_HOST: 0.0.0.0
      AUTH_URL: http://ms-auth:8081
      CLIENTE_URL: http://ms-cliente:8082
      CONTA_URL: http://ms-conta:8083
      GERENTE_URL: http://ms-gerente:8084
      ADMIN_URL: http://ms-admin:8085
    ports:
      - "3000:3000"
    depends_on:
      ms-auth:
        condition: service_started
      ms-cliente:
        condition: service_started
      ms-conta:
        condition: service_started
      ms-gerente:
        condition: service_started
    networks:
      - bantads-network

networks:
  bantads-network:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  rabbitmq-data:
